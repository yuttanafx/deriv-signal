<!DOCTYPE html>
<html lang="th">
<head> 
<meta charset="UTF-8">
<title>TVE Options Matrix · Realtime Pro Engine</title>
<style>
  :root{--bg:#08080d;--panel:#0f0f16;--gold:#f5c842;--green:#00e676;--red:#ff4455;--border:#1c1c2a;--text:#e0e0ee;}
  body{background:var(--bg);color:var(--text);font-family:sans-serif;margin:0;overflow:hidden;}
  .layout{display:grid;grid-template-columns:1fr 360px;height:100vh;}
  .left{background:#000;display:flex;flex-direction:column;}
  #tv_chart_container{flex:1;}
  .sidebar{background:var(--panel);border-left:1px solid var(--border);padding:15px;overflow-y:auto;}
  .sig-table{width:100%;border-collapse:collapse;font-size:11px;}
  .sig-table td{padding:10px;border-bottom:1px solid var(--border);}
  .buy{color:var(--green);} .sell{color:var(--red);}
</style>
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
<div class="layout">
    <div class="left">
        <div style="padding:15px; font-weight:bold; color:var(--gold);" id="focusTitle">Volatility 75</div>
        <div id="tv_chart_container"></div>
    </div>
    <div class="sidebar">
        <h3>Live Analysis (ATR Filtered)</h3>
        <table class="sig-table">
            <thead><tr><th>สินทรัพย์</th><th>ราคา</th><th>สถานะ</th></tr></thead>
            <tbody id="sigTableBody"></tbody>
        </table>
    </div>
</div>

<script>
// 1. ตั้งค่าสินทรัพย์และ TradingView
const ASSETS = {
    R_10: { tv: "DERIV:10", name: "Vol 10" },
    R_75: { tv: "DERIV:75", name: "Vol 75" }
};
let chartFocus = 'R_75';

function updateChart() {
    new TradingView.widget({
        width: "100%", height: "100%",
        symbol: ASSETS[chartFocus].tv,
        interval: "1", theme: "dark",
        container_id: "tv_chart_container"
    });
}

// 2. ระบบเชื่อมต่อ Deriv API (WebSocket)
let ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");
ws.onopen = () => console.log("Deriv Gateway Connected");
ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);
    // รับค่าราคาและตรวจสอบเงื่อนไข ATR ที่นี่
};

// 3. ฟังก์ชันยิงออเดอร์ (เมื่อกรองผ่าน)
function placeOrder(symbol, dir) {
    console.log(`Executing ${dir} on ${symbol}`);
    ws.send(JSON.stringify({
        proposal: 1,
        amount: 1,
        basis: "stake",
        contract_type: dir === 'buy' ? "CALL" : "PUT",
        currency: "USD",
        duration: 1,
        duration_unit: "m",
        symbol: symbol
    }));
}

// 4. ลอจิกตารางและคลิกสลับกราฟ
function renderTable() {
    const tbody = document.getElementById('sigTableBody');
    tbody.innerHTML = '';
    Object.keys(ASSETS).forEach(key => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td style="color:var(--blue); text-decoration:underline; cursor:pointer;" onclick="switchChart('${key}')">${ASSETS[key].name}</td>
            <td id="price-${key}">--</td>
            <td id="status-${key}">WAIT</td>
        `;
        tbody.appendChild(row);
    });
}

function switchChart(key) {
    chartFocus = key;
    document.getElementById('focusTitle').textContent = ASSETS[key].name;
    updateChart();
}

updateChart();
renderTable();
</script>
</body>
</html>
