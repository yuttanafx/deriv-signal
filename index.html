<script>
    // --- 1. ข้อมูลผลิตภัณฑ์กลุ่ม Volatility ทั้งหมดของ Deriv ---
    const ASSETS = [
        { id: 'R_10', name: 'Volatility 10 Index', type: 'standard' },
        { id: 'R_25', name: 'Volatility 25 Index', type: 'standard' },
        { id: 'R_50', name: 'Volatility 50 Index', type: 'standard' },
        { id: 'R_75', name: 'Volatility 75 Index', type: 'standard' },
        { id: 'R_100', name: 'Volatility 100 Index', type: 'standard' },
        { id: '1HZ10V', name: 'Volatility 10 (1s) Index', type: 'fast' },
        { id: '1HZ25V', name: 'Volatility 25 (1s) Index', type: 'fast' },
        { id: '1HZ30V', name: 'Volatility 30 (1s) Index', type: 'fast' },
        { id: '1HZ50V', name: 'Volatility 50 (1s) Index', type: 'fast' },
        { id: '1HZ75V', name: 'Volatility 75 (1s) Index', type: 'fast' },
        { id: '1HZ100V', name: 'Volatility 100 (1s) Index', type: 'fast' },
        { id: 'R_150', name: 'Volatility 150 Index', type: 'high' },
        { id: 'R_250', name: 'Volatility 250 Index', type: 'high' }
    ];

    // --- 2. การจัดการสถานะ (State Management) ---
    const APP_ID = '1089';
    let ws;
    let activeWatchlist = new Set(['R_75', 'R_100', '1HZ75V']); // ค่าเริ่มต้นติดตาม 3 ตัว
    let focusedAsset = 'R_75';
    let lookbackPeriod = 30; // ปรับตาม Duration

    // โครงสร้างเก็บข้อมูลดิบของแต่ละสินทรัพย์
    let marketData = {}; 
    ASSETS.forEach(a => {
        marketData[a.id] = {
            prices: [],
            lastPrice: 0,
            prevPrice: 0,
            resistance: 0,
            support: 0,
            currentSignal: 'NEUTRAL',
            signalText: 'กำลังวิเคราะห์…',
            signalSub: 'รอข้อมูลคำนวณกรอบราคา',
            history: [], // { id, direction, entryPrice, expiryTickCount, result, status }
            wins: 0,
            losses: 0,
            pending: 0
        };
    });

    // --- 3. DOM Elements การเข้าถึงส่วนแสดงผล ---
    const connDot = document.getElementById('conn-dot');
    const apiStatus = document.getElementById('api-status');
    const pickerContainer = document.getElementById('watchlist-picker');
    const watchCountEl = document.getElementById('watch-count');
    const watchGrid = document.getElementById('watch-grid');
    const watchEmpty = document.getElementById('watch-empty');
    const focusSection = document.getElementById('focus-section');
    const durationSelect = document.getElementById('duration-select');
    const logContainer = document.getElementById('log-container');

    // --- 4. ฟังก์ชันการเชื่อมต่อ WebSocket API ---
    function initWebSocket() {
        ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

        ws.onopen = () => {
            connDot.className = 'dot live';
            apiStatus.textContent = 'LIVE';
            addLog("เชื่อมต่อเซิร์ฟเวอร์หลักของ Deriv สำเร็จ (Multi-Stream Mode)");
            syncSubscriptions();
        };

        ws.onmessage = (msg) => {
            const data = JSON.parse(msg.data);
            if (data.msg_type === 'tick') {
                processTick(data.tick);
            }
        };

        ws.onclose = () => {
            connDot.className = 'dot';
            apiStatus.textContent = 'การเชื่อมต่อหลุด';
            setTimeout(initWebSocket, 4000); // Reconnect ลูป 4 วินาที
        };
    }

    function syncSubscriptions() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        // ล้างสตรีมเดิมแล้วเปิดรับสตรีมเฉพาะตัวที่อยู่ใน Watchlist
        ws.send(JSON.stringify({ forget_all: "ticks" }));
        activeWatchlist.forEach(symbol => {
            ws.send(JSON.stringify({ ticks: symbol }));
        });
    }

    // --- 5. ลอจิกประมวลผลโครงสร้างราคาและการกรองสัญญาณ ---
    function processTick(tick) {
        const symbol = tick.symbol;
        if (!activeWatchlist.has(symbol)) return;

        const price = parseFloat(tick.quote);
        const asset = marketData[symbol];
        
        asset.prevPrice = asset.lastPrice || price;
        asset.lastPrice = price;
        asset.prices.push(price);

        if (asset.prices.length > lookbackPeriod) asset.prices.shift();

        // เช็กผลลัพธ์ของออปชันที่กำลังรอผลอยู่ (Pending Contracts)
        checkPendingContracts(symbol, price);

        // คำนวณแนวรับแนวต้าน (Donchian / High-Low Channels ย้อนหลัง)
        if (asset.prices.length >= 10) {
            asset.resistance = Math.max(...asset.prices.slice(0, -3));
            asset.support = Math.min(...asset.prices.slice(0, -3));
            
            // คำนวณโมเมนตัมแบบไว
            const shortEMA = asset.prices.slice(-5).reduce((a,b)=>a+b,0)/5;
            const longEMA = asset.prices.reduce((a,b)=>a+b,0)/asset.prices.length;

            const range = asset.resistance - asset.support;
            const bufferZone = range * 0.15; // กำแพงป้องกัน 15% บล็อกปลายเทรน
            const midMin = asset.support + (range * 0.42);
            const midMax = asset.support + (range * 0.58);

            let rawDir = shortEMA > longEMA ? 'BUY' : 'SELL';

            // 🛡️ ระบบกรองความปลอดภัยแนวรับแนวต้าน และป้องกันการออกสัญญาณกลางทาง (Mid-Zone)
            if (rawDir === 'BUY') {
                if ((asset.resistance - price) < bufferZone) {
                    asset.currentSignal = 'BLOCK';
                    asset.signalText = 'BLOCK: NEAR RESISTANCE';
                    asset.signalSub = '⚠️ ระงับสัญญาณซื้อ: ราคาประชิดกำแพงแนวต้านด้านบน';
                } else if (price > midMin && price < midMax) {
                    asset.currentSignal = 'BLOCK';
                    asset.signalText = 'BLOCK: MID-ZONE';
                    asset.signalSub = '⏳ ระงับสัญญาณ: ราคากองอยู่กลางทางกรอบไซด์เวย์';
                } else {
                    if(asset.currentSignal !== 'BUY') triggerNewContract(symbol, 'HIGHER', price);
                    asset.currentSignal = 'BUY';
                    asset.signalText = 'HIGHER / CALL';
                    asset.signalSub = '🟢 สัญญาณซื้อเปิดทำงาน: พื้นที่ทำกำไรด้านบนเปิดกว้าง';
                }
            } else {
                if ((price - asset.support) < bufferZone) {
                    asset.currentSignal = 'BLOCK';
                    asset.signalText = 'BLOCK: NEAR SUPPORT';
                    asset.signalSub = '⚠️ ระงับสัญญาณขาย: ราคาลงมาลึกใกล้แนวรับหลักด้านล่าง';
                } else if (price > midMin && price < midMax) {
                    asset.currentSignal = 'BLOCK';
                    asset.signalText = 'BLOCK: MID-ZONE';
                    asset.signalSub = '⏳ ระงับสัญญาณ: สภาพราคาไม่เลือกข้างอยู่กึ่งกลางโครงสร้าง';
                } else {
                    if(asset.currentSignal !== 'SELL') triggerNewContract(symbol, 'LOWER', price);
                    asset.currentSignal = 'SELL';
                    asset.signalText = 'LOWER / PUT';
                    asset.signalSub = '🔴 สัญญาณขายเปิดทำงาน: โครงสร้างราคาหลุดลงด้านล่างโล่ง';
                }
            }
        }

        // อัปเดต UI หน้าจอ
        renderWatchlistGrid();
        if (symbol === focusedAsset) {
            renderFocusedAsset();
        }
        renderCombinedStats();
    }

    // --- 6. ระบบจำลองอายุสัญญาออปชัน (Option Expiry Simulation) ---
    function triggerNewContract(symbol, direction, entryPrice) {
        // เลือกจำนวน Tick ยืดหยุ่นตามประเภท Duration
        let durationType = durationSelect.value;
        let ticksToWait = 5;
        if(durationType === "10_ticks") ticksToWait = 10;
        if(durationType === "1_min") ticksToWait = 30; // จำลอง 30 Ticks
        if(durationType === "5_min") ticksToWait = 120;

        const asset = marketData[symbol];
        const assetName = ASSETS.find(a => a.id === symbol).name;

        const newContract = {
            id: 'TX-' + Math.floor(Math.random() * 90000 + 10000),
            direction: direction,
            entryPrice: entryPrice,
            ticksRemaining: ticksToWait,
            status: 'PENDING'
        };

        asset.history.unshift(newContract);
        asset.pending++;
        addLog(`🎯 สัญญาณใหม่ [${direction}] บน ${assetName} (เริ่มจับเวลา ${ticksToWait} Ticks)`);
    }

    function checkPendingContracts(symbol, currentPrice) {
        const asset = marketData[symbol];
        asset.history.forEach(c => {
            if (c.status === 'PENDING') {
                c.ticksRemaining--;
                if (c.ticksRemaining <= 0) {
                    c.status = 'COMPLETED';
                    asset.pending--;
                    
                    // คำนวณผลลัพธ์สัญญาแพ้/ชนะ
                    if (c.direction === 'HIGHER') {
                        c.result = currentPrice > c.entryPrice ? 'WIN' : 'LOSS';
                    } else {
                        c.result = currentPrice < c.entryPrice ? 'WIN' : 'LOSS';
                    }

                    if (c.result === 'WIN') asset.wins++; else asset.losses++;
                    
                    const assetName = ASSETS.find(a => a.id === symbol).name;
                    const resColor = c.result === 'WIN' ? '🟢 ถูก' : '🔴 ผิด';
                    addLog(`🏁 สรุปผลออปชัน ${assetName}: สัญญา ${c.id} ได้ผลลัพธ์ -> ${resColor} (ราคาเข้า: ${c.entryPrice} -> ราคาจบ: ${currentPrice})`);
                }
            }
        });
    }

    // --- 7. การวาดผลและอัปเดตหน้าตา UI (Rendering UI) ---
    function buildWatchlistPicker() {
        pickerContainer.innerHTML = '';
        ASSETS.forEach(asset => {
            const chip = document.createElement('div');
            chip.className = `chip ${activeWatchlist.has(asset.id) ? 'active' : ''}`;
            chip.textContent = asset.id;
            chip.title = asset.name;
            chip.onclick = () => toggleWatchlist(asset.id);
            pickerContainer.appendChild(chip);
        });
        watchCountEl.textContent = `${activeWatchlist.size} รายการ`;
    }

    function toggleWatchlist(symbol) {
        if (activeWatchlist.has(symbol)) {
            if (activeWatchlist.size > 1) {
                activeWatchlist.delete(symbol);
                if (focusedAsset === symbol) {
                    focusedAsset = Array.from(activeWatchlist)[0];
                }
            }
        } else {
            activeWatchlist.add(symbol);
            focusedAsset = symbol; // โฟกัสตัวที่เพิ่งเลือกทันที
        }
        buildWatchlistPicker();
        syncSubscriptions();
        
        // รีเซ็ตกราฟย่อยใหม่
        if(activeWatchlist.size === 0) {
            watchEmpty.style.display = 'block';
            focusSection.style.display = 'none';
        } else {
            watchEmpty.style.display = 'none';
            focusSection.style.display = 'block';
        }
    }

    function renderWatchlistGrid() {
        if (activeWatchlist.size === 0) {
            watchGrid.innerHTML = `<div class="watch-empty">ยังไม่ได้เลือกสินทรัพย์ — แตะชิปด้านบนเพื่อเริ่มติดตาม</div>`;
            return;
        }

        watchGrid.innerHTML = '';
        activeWatchlist.forEach(symbol => {
            const asset = marketData[symbol];
            const meta = ASSETS.find(a => a.id === symbol);
            
            const card = document.createElement('div');
            card.className = `watch-card ${focusedAsset === symbol ? 'focused' : ''}`;
            card.onclick = () => {
                focusedAsset = symbol;
                document.querySelectorAll('.watch-card').forEach(c => c.classList.remove('focused'));
                card.classList.add('focused');
                renderFocusedAsset();
            };

            // คำนวณเปอร์เซ็นต์ Win Rate รายตัว
            const total = asset.wins + asset.losses;
            const wr = total > 0 ? ((asset.wins / total) * 100).toFixed(0) + '%' : '—';

            let badgeClass = 'neutral';
            if (asset.currentSignal === 'BUY') badgeClass = 'buy';
            if (asset.currentSignal === 'SELL') badgeClass = 'sell';
            if (asset.currentSignal === 'BLOCK') badgeClass = 'block';

            // สร้างเส้นกราฟย่อยขนาดจิ๋ว (Mini Sparkline SVG)
            const sparkPoints = asset.prices.map((p, idx) => {
                const x = (idx / (lookbackPeriod - 1)) * 120;
                const min = Math.min(...asset.prices);
                const max = Math.max(...asset.prices);
                const y = max === min ? 14 : 26 - ((p - min) / (max - min)) * 24;
                return `${x},${y}`;
            }).join(' ');

            card.innerHTML = `
                <div class="wc-top">
                    <div class="wc-name">${meta.name}</div>
                    <div class="wc-badge ${badgeClass}">${asset.currentSignal}</div>
                </div>
                <div class="wc-mid">
                    <div class="wc-price">${asset.lastPrice ? asset.lastPrice.toFixed(2) : '0.00'}</div>
                    <div class="wc-spark-wrap">
                        <svg><polyline fill="none" stroke="${asset.currentSignal==='BUY'?'var(--buy)':asset.currentSignal==='SELL'?'var(--sell)':'var(--accent)'}" stroke-width="1.2" points="${sparkPoints}"></polyline></svg>
                    </div>
                </div>
                <div class="wc-bottom">
                    <div class="wc-wr">Win Rate: <span class="wc-wr-val ${total > 0 && parseFloat(wr)>=50?'good':'bad'}">${wr}</span></div>
                    <div>คิวรอผล: ${asset.pending}</div>
                </div>
            `;
            watchGrid.appendChild(card);
        });
    }

    function renderFocusedAsset() {
        const asset = marketData[focusedAsset];
        const meta = ASSETS.find(a => a.id === focusedAsset);

        document.getElementById('fl-name').textContent = meta.name;
        document.getElementById('hero-asset').textContent = focusedAsset;
        document.getElementById('current-price').textContent = asset.lastPrice ? asset.lastPrice.toFixed(2) : '0.00';
        
        // คำนวณเปอร์เซ็นต์การขยับของราคาล่าสุด
        const delta = ((asset.lastPrice - asset.prevPrice) / (asset.prevPrice || 1)) * 100;
        const deltaEl = document.getElementById('price-delta');
        deltaEl.textContent = (delta >= 0 ? '+' : '') + delta.toFixed(3) + '%';
        deltaEl.className = `price-delta ${delta > 0 ? 'up' : delta < 0 ? 'down' : 'flat'}`;

        document.getElementById('res-price').textContent = asset.resistance ? asset.resistance.toFixed(2) : '0.00';
        document.getElementById('sup-price').textContent = asset.support ? asset.support.toFixed(2) : '0.00';

        // ปรับแต่งสีและข้อความของแผง Signal ตัวใหญ่
        const sigPanel = document.getElementById('signal-output');
        const sigText = document.getElementById('sig-text');
        const sigSub = document.getElementById('sig-sub');
        
        sigPanel.className = `signal ${asset.currentSignal.toLowerCase()}`;
        sigText.textContent = asset.signalText;
        sigSub.textContent = asset.signalSub;

        // วาดรูปกราฟเทรนใหญ่ SVG Sparkline ด้านหลังกล่องราคา
        drawBigSparkline(asset.prices);

        // คำนวณและพล็อตกราฟ Track Record ด้านล่าง
        const total = asset.wins + asset.losses;
        const wrRate = total > 0 ? ((asset.wins / total) * 100).toFixed(0) + '%' : '—';
        
        document.getElementById('track-count').textContent = `${total + asset.pending} สัญญาณ`;
        document.getElementById('ts-winrate').textContent = wrRate;
        document.getElementById('ts-wins').textContent = asset.wins;
        document.getElementById('ts-losses').textContent = asset.losses;
        document.getElementById('ts-pending').textContent = asset.pending;
        document.getElementById('tb-fill').style.width = total > 0 ? `${(asset.wins / total) * 100}%` : '0%';

        // อัปเดตรายการลิสต์ประวัติใต้แถบเป้าหมาย
        const listContainer = document.getElementById('track-list');
        const completedContracts = asset.history.filter(c => c.status === 'COMPLETED');

        if(completedContracts.length === 0) {
            listContainer.innerHTML = `<li class="empty">ยังไม่มีสัญญาณที่ได้ผลลัพธ์ในเซสชันนี้</li>`;
        } else {
            listContainer.innerHTML = '';
            completedContracts.forEach(c => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <div class="tl-result ${c.result.toLowerCase()}">${c.result[0]}</div>
                    <div class="tl-dir ${c.direction.toLowerCase()}">${c.direction}</div>
                    <div class="tl-prices">ที่ราคา ${c.entryPrice.toFixed(2)}</div>
                    <div class="tl-time">ID: ${c.id}</div>
                `;
                listContainer.appendChild(li);
            });
        }
    }

    function drawBigSparkline(prices) {
        const polyline = document.getElementById('spark-line');
        const polygon = document.getElementById('spark-fill');
        if (prices.length < 2) return;

        const min = Math.min(...prices);
        const max = Math.max(...prices);
        const spread = max - min;

        const points = prices.map((p, idx) => {
            const x = (idx / (prices.length - 1)) * 600;
            const y = spread === 0 ? 32 : 58 - ((p - min) / spread) * 52;
            return `${x},${y}`;
        });

        const linePoints = points.join(' ');
        polyline.setAttribute('points', linePoints);

        // ทำพื้นเงาสี Gradient ใต้เส้นกราฟ
        const fillPoints = `0,64 ${linePoints} 600,64`;
        polygon.setAttribute('points', fillPoints);
    }

    function renderCombinedStats() {
        const banner = document.getElementById('combined-banner');
        const winrateEl = document.getElementById('cb-winrate');
        
        let totalWins = 0;
        let totalLosses = 0;

        activeWatchlist.forEach(symbol => {
            totalWins += marketData[symbol].wins;
            totalLosses += marketData[symbol].losses;
        });

        const grandTotal = totalWins + totalLosses;
        if (grandTotal > 0) {
            banner.style.display = 'flex';
            winrateEl.textContent = ((totalWins / grandTotal) * 100).toFixed(1) + '%';
        } else {
            banner.style.display = 'none';
        }
    }

    function addLog(text) {
        const time = new Date().toLocaleTimeString();
        const li = document.createElement('li');
        li.textContent = `[${time}] ${text}`;
        logContainer.insertBefore(li, logContainer.firstChild);
        if (logContainer.children.length > 40) logContainer.removeChild(logContainer.lastChild);
    }

    // --- 8. Event Listeners จุดดักการทำงานตัวควบคุมเวลากลาง ---
    durationSelect.addEventListener('change', (e) => {
        const duration = e.target.value;
        if(duration === "5_ticks") lookbackPeriod = 20;
        if(duration === "10_ticks") lookbackPeriod = 40;
        if(duration === "1_min") lookbackPeriod = 90;
        if(duration === "5_min") lookbackPeriod = 260;

        // ล้างประวัติเพื่อคำนวณสเกลฐานเวลาความต้านทานใหม่
        activeWatchlist.forEach(symbol => {
            marketData[symbol].prices = [];
            marketData[symbol].currentSignal = 'NEUTRAL';
        });
        addLog(`⏰ ปรับเปลี่ยนระยะเวลาหมดอายุสัญญาเป็น [${durationSelect.options[durationSelect.selectedIndex].text}] ปรับโมเดลความไวเรียบร้อยแล้ว`);
    });

    // เริ่มต้นระบบทั้งหมดเมื่อหน้าเว็บพร้อมทำงาน
    buildWatchlistPicker();
    focusSection.style.display = 'block';
    watchEmpty.style.display = 'none';
    initWebSocket();
</script>
